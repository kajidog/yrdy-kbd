# gqlgen configuration. The schema lives in packages/schema so the frontends
# can generate their typed clients from the same file.
schema:
  - ../../packages/schema/schema.graphql

exec:
  filename: internal/graph/generated.go
  package: graph

model:
  filename: internal/graph/model/models_gen.go
  package: model

resolver:
  layout: follow-schema
  dir: internal/graph
  package: graph
  filename_template: "{name}.resolvers.go"

models:
  ID:
    model:
      - github.com/99designs/gqlgen/graphql.ID
  Time:
    model:
      - github.com/99designs/gqlgen/graphql.Time
  StringMap:
    model:
      - yrdy-kbd/apps/bff/internal/graph/model.StringMap
