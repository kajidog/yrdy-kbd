services:
  bff:
    build: ./apps/bff
    ports:
      - "8080:8080"
    env_file:
      - ./apps/bff/.env
    environment:
      AWS_PROFILE: ${AWS_PROFILE:-dev}
    volumes:
      - ./apps/bff:/app
      - bff_tmp:/app/tmp
      - bff_data:/app/data
      - ${HOME}/.aws:/root/.aws:ro

  publisher:
    build:
      context: .
      dockerfile: apps/publisher/Dockerfile
    ports:
      - "5173:5173"
    env_file:
      - ./apps/publisher/.env
    volumes:
      - .:/app
      - node_modules:/app/node_modules
    depends_on:
      - bff

  viewer:
    build:
      context: .
      dockerfile: apps/viewer/Dockerfile
    ports:
      - "5174:5174"
    env_file:
      - ./apps/viewer/.env
    volumes:
      - .:/app
      - node_modules:/app/node_modules
    depends_on:
      - bff

volumes:
  bff_tmp:
  bff_data:
  node_modules:
