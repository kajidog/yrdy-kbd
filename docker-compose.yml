services:
  bff:
    build: ./apps/bff
    ports:
      - "8080:8080"
    env_file:
      - ./apps/bff/.env
    environment:
      AWS_PROFILE: ${AWS_PROFILE:-dev}
    volumes:
      - ./apps/bff:/app
      - bff_tmp:/app/tmp
      - bff_data:/app/data
      - ${HOME}/.aws:/root/.aws:ro

  publisher:
    build: ./apps/publisher
    ports:
      - "5173:5173"
    env_file:
      - ./apps/publisher/.env
    volumes:
      - ./apps/publisher:/app
      - publisher_node_modules:/app/node_modules
    depends_on:
      - bff

  viewer:
    build: ./apps/viewer
    ports:
      - "5174:5174"
    env_file:
      - ./apps/viewer/.env
    volumes:
      - ./apps/viewer:/app
      - viewer_node_modules:/app/node_modules
    depends_on:
      - bff

volumes:
  bff_tmp:
  bff_data:
  publisher_node_modules:
  viewer_node_modules:
